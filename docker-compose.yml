version: "2.4"

services:
  proxy:
    build: ./proxy
    restart: unless-stopped
    network_mode: host
    volumes:
      - proxy_certs:/etc/haproxy/certs
    environment:
      - HAPROXY_CERT_CN=${HAPROXY_CERT_CN:-openclaw.local}
    depends_on:
      - openclaw

  openclaw:
    build: ./gateway
    restart: unless-stopped
    network_mode: host
    volumes:
      - openclaw_data:/data
      - openclaw_home:/root

    tmpfs:
      - /tmp:rw,noexec,nosuid,size=256M

    environment:
      # Gateway token — auto-generated if empty (see start.sh)
      - OPENCLAW_GATEWAY_TOKEN=

      # Comma-separated extra Control UI origins for custom DNS/Tailscale/etc.
      # Example: https://openclaw.example.com,https://my-pi.ts.net
      - OPENCLAW_CONTROL_UI_ORIGINS=

      # Single public browser origin. Useful for pasting the Balena tunnel URL.
      - OPENCLAW_PUBLIC_ORIGIN=

      # IPv6 is disabled by default for simpler Raspberry Pi/LAN deployments.
      - OPENCLAW_ENABLE_IPV6=false

      # Set to a specific version to upgrade/downgrade (e.g. "2026.5.22")
      - OPENCLAW_VERSION=

      # Number of version snapshots to keep (default: 3)
      - OPENCLAW_KEEP_VERSIONS=3

      # Set true for repair/debug sessions without starting the gateway
      - OPENCLAW_GATEWAY_STOP=false

      # PERFORMANCE & WEAR OPTIMIZATIONS
      # Redirect compilation bytecode cache to RAM-backed tmpfs mount
      - NODE_COMPILE_CACHE=/tmp/openclaw-compile-cache
      # Prevent swapping on Raspberry Pi and specify DNS resolution order
      - NODE_OPTIONS=--dns-result-order=ipv4first --max-old-space-size=1024

volumes:
  openclaw_data:
  openclaw_home:
  proxy_certs:
