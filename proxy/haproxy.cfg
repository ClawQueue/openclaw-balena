global
    log stdout format raw local0 warning
    maxconn 256

defaults
    log     global
    mode    http
    option  dontlognull
    option  httplog
    option  forwardfor
    timeout connect 5s
    timeout client  60s
    timeout server  60s
    timeout tunnel  3600s

frontend http_in
    bind *:80

    # Detect if request arrives via Balena public URL tunnel
    acl is_balena_public hdr_end(Host) -i balena-devices.com

    # For balena public URL: serve the web UI directly (Balena proxies HTTPS→HTTP to port 80)
    # For LAN access: redirect to HTTPS
    http-request redirect scheme https code 301 unless is_balena_public

    # Balena public URL traffic: forward proxy headers but keep the original Host
    # so the gateway knows its public URL for redirects
    http-request set-header X-Forwarded-Proto https if is_balena_public
    http-request set-header X-Forwarded-For %[src] if is_balena_public
    http-request set-header X-Real-IP %[src] if is_balena_public

    use_backend openclaw_gateway if is_balena_public

frontend https_in
    bind *:443 ssl crt /etc/haproxy/certs/self-signed.pem
    http-request set-header X-Forwarded-Proto https
    http-request set-header X-Forwarded-For %[src]
    http-request set-header X-Real-IP %[src]
    default_backend openclaw_gateway

backend openclaw_gateway
    server gateway 127.0.0.1:8080 check
